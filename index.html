<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Impostor</title>
    <style>
        /* CSS focado em Mobile */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        h1 { color: #ff4757; }
        /* O segredo para trocar de tela: esconder o que não está ativo */
        .tela { display: none; width: 100%; max-width: 400px; }
        .tela.ativa { display: block; }
        
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
        }
        button:active { background-color: #ff6b81; }
        input {
            padding: 10px;
            font-size: 16px;
            width: calc(100% - 24px);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .lista-jogadores { text-align: left; background: #1e1e1e; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="tela-menu" class="tela ativa">
        <h1>Jogo do Impostor 🕵️‍♂️</h1>
        
        <div class="lista-jogadores">
            <h3>Jogadores:</h3>
            <ul id="lista-ul">
                </ul>
        </div>

        <input type="text" id="novo-jogador" placeholder="Nome do jogador">
        <button onclick="adicionarJogador()">Adicionar Jogador</button>
        <button onclick="iniciarJogo()" style="background-color: #2ed573;">Iniciar Jogo</button>
    </div>

    <div id="tela-passar" class="tela">
        <h2 id="texto-passar">Passe o celular para...</h2>
        <button onclick="revelarPapel()">Mostrar meu segredo</button>
    </div>

    <div id="tela-revelacao" class="tela">
        <h2 id="titulo-papel">--- SEGREDO ---</h2>
        <p id="texto-papel" style="font-size: 24px; font-weight: bold;"></p>
        <button onclick="proximoJogador()">Entendi, esconder!</button>
    </div>

    <script>
        // --- VARIÁVEIS GLOBAIS (O "Estado" do seu jogo) ---
        let jogadores = ["Bruno", "Julia", "Celina"];
        let historicoImpostores = [];
        let placar = {};
        let comidas = ["Açaí", "Alfajor", "Arroz Doce", "Batata Frita", "Pizza", "Sushi"]; // Lista reduzida para teste
        
        // Controles da rodada atual
        let impostorAtual = "";
        let comidaAtual = "";
        let indiceJogadorAtual = 0;

        // Inicia o placar e renderiza o menu
        function atualizarMenu() {
            const ul = document.getElementById('lista-ul');
            ul.innerHTML = '';
            jogadores.forEach(j => {
                ul.innerHTML += `<li>${j}</li>`;
                if (!(j in placar)) placar[j] = 0;
            });
        }

        function adicionarJogador() {
            const input = document.getElementById('novo-jogador');
            const nome = input.value.trim();
            if (nome && !jogadores.includes(nome)) {
                jogadores.push(nome);
                input.value = '';
                atualizarMenu();
            } else {
                alert("Nome inválido ou já existe!");
            }
        }

        // --- NAVEGAÇÃO DE TELAS ---
        function mostrarTela(idTela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');
        }

        // --- LÓGICA DO JOGO ---
        function iniciarJogo() {
            if (jogadores.length < 3) {
                alert("Mínimo de 3 jogadores!");
                return;
            }
            
            // Sorteia comida
            comidaAtual = comidas[Math.floor(Math.random() * comidas.length)];
            
            // Sorteia impostor (com a sua trava de 2 vezes!)
            let candidatos = [...jogadores];
            if (historicoImpostores.length >= 2) {
                let ultimo = historicoImpostores[historicoImpostores.length - 1];
                let penultimo = historicoImpostores[historicoImpostores.length - 2];
                if (ultimo === penultimo && candidatos.includes(ultimo)) {
                    candidatos = candidatos.filter(j => j !== ultimo);
                }
            }
            impostorAtual = candidatos[Math.floor(Math.random() * candidatos.length)];
            historicoImpostores.push(impostorAtual);

            // Reseta a fila para passar o celular
            indiceJogadorAtual = 0;
            prepararPassarCelular();
        }

        function prepararPassarCelular() {
            if (indiceJogadorAtual < jogadores.length) {
                document.getElementById('texto-passar').innerText = `Passe o celular para ${jogadores[indiceJogadorAtual]}`;
                mostrarTela('tela-passar');
            } else {
                // Aqui iria para a tela de PERGUNTAS e VOTAÇÃO
                alert("Fase de revelação acabou! (Aqui entrarão as perguntas e votação)");
                mostrarTela('tela-menu'); // Voltando ao menu temporariamente
            }
        }

        function revelarPapel() {
            const jogador = jogadores[indiceJogadorAtual];
            document.getElementById('titulo-papel').innerText = `--- SEGREDO DE ${jogador.toUpperCase()} ---`;
            
            if (jogador === impostorAtual) {
                document.getElementById('texto-papel').innerText = "🚨 VOCÊ É O IMPOSTOR! 🚨";
                document.getElementById('texto-papel').style.color = "#ff4757";
            } else {
                document.getElementById('texto-papel').innerText = `✅ VOCÊ É CIDADÃO!\nComida: ${comidaAtual}`;
                document.getElementById('texto-papel').style.color = "#2ed573";
            }
            mostrarTela('tela-revelacao');
        }

        function proximoJogador() {
            indiceJogadorAtual++;
            prepararPassarCelular();
        }

        // Inicializa a tela
        atualizarMenu();
    </script>
</body>
</html>
