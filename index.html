<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Impostor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        h1, h2, h3 { color: #ff4757; }
        .tela { display: none; width: 100%; max-width: 400px; }
        .tela.ativa { display: block; }
        
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px 20px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }
        button:active { background-color: #ff6b81; }
        .btn-verde { background-color: #2ed573; margin-top: 20px;}
        .btn-verde:active { background-color: #26b360; }
        .btn-pequeno { padding: 5px 10px; width: auto; margin: 0; background-color: transparent; border: 1px solid #ff4757; color: #ff4757;}
        
        input {
            padding: 15px;
            font-size: 16px;
            width: calc(100% - 34px); /* Ajuste de padding */
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 10px;
            background-color: #1e1e1e;
            color: white;
        }
        .sessao-box { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left;}
        .placar-item, .jogador-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 10px 0;}
        .jogador-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div id="tela-menu" class="tela ativa">
        <h1>Jogo do Impostor 🕵️‍♂️</h1>
        
        <div class="sessao-box">
            <h3 style="margin-top: 0;">Novo Jogador</h3>
            <input type="text" id="novo-jogador" placeholder="Digite o nome do jogador...">
            <button onclick="adicionarJogador()">Confirmar</button>
        </div>

        <div class="sessao-box" id="box-jogadores">
            <h3 style="margin-top: 0;">Jogadores na Partida (<span id="contagem-jogadores">0</span>)</h3>
            <div id="lista-jogadores-ui"></div>
        </div>

        <div class="sessao-box" id="box-placar" style="display: none;">
            <h3 style="margin-top: 0;">Placar Atual:</h3>
            <div id="lista-placar"></div>
        </div>

        <button onclick="iniciarJogo()" class="btn-verde">Iniciar Jogo</button>
    </div>

    <div id="tela-passar" class="tela">
        <h2 id="texto-passar">Passe o celular para...</h2>
        <button onclick="revelarPapel()">Mostrar meu segredo</button>
    </div>

    <div id="tela-revelacao" class="tela">
        <h2 id="titulo-papel">--- SEGREDO ---</h2>
        <p id="texto-papel" style="font-size: 24px; font-weight: bold;"></p>
        <button onclick="proximoJogadorFaseRevelacao()">Entendi, esconder!</button>
    </div>

    <div id="tela-perguntas" class="tela">
        <h2>🎙️ Hora das Perguntas</h2>
        <p id="texto-pergunta" style="font-size: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px;"></p>
        <button onclick="proximaPergunta()" class="btn-verde">Próxima Pergunta</button>
    </div>

    <div id="tela-votacao" class="tela">
        <h2>⚖️ Votação</h2>
        <h3 id="texto-vez-votar"></h3>
        <p>Quem é o impostor?</p>
        <div id="botoes-votos"></div>
    </div>

    <div id="tela-resultado" class="tela">
        <h2 id="titulo-resultado">Resultado da Rodada</h2>
        <p id="texto-resultado" style="font-size: 20px;"></p>
        <button onclick="mostrarMenuPosJogo()" class="btn-verde">Jogar Mais Uma</button>
    </div>

    <div id="tela-palpite" class="tela">
        <h2>🤐 O Impostor era: <span id="nome-impostor-descoberto"></span></h2>
        <p>Você foi descoberto! Qual era a comida secreta para ganhar 1 ponto de consolação?</p>
        <div id="botoes-palpite"></div>
    </div>

    <script>
        // --- VARIÁVEIS GLOBAIS ---
        let jogadores = []; // Começa vazio
        let placar = {};
        let historicoImpostores = [];
        let comidasUsadas = [];
        let jogoJaIniciou = false;
        
        let comidas = ["Açaí", "Alfajor", "Arroz Doce", "Bacon", "Batata Frita", "Beijinho", "Bife à Parmegiana", "Bolo de Cenoura", "Brigadeiro", "Cachorro Quente", "Churros", "Coxinha", "Croissant", "Feijoada", "Hambúrguer", "Lasanha", "Macarrão", "Misto Quente", "Omelete", "Panqueca", "Pastel", "Pão de Queijo", "Pipoca", "Pizza", "Pudim", "Salada", "Sorvete", "Strogonoff", "Sushi", "Yakisoba"];
        let perguntas = ["Você prefere comer isso no café da manhã, almoço, janta ou na madrugada?", "É o tipo de comida que você divide ou come escondido?", "Combina mais com refri, suco natural ou cerveja?", "Qual o molho não pode faltar?", "Fica melhor no dia seguinte requentado?", "Faz muita sujeira para comer no sofá?", "Dá para comer todo dia ou enjoa?", "Você prefere a versão caseira ou comprada?", "Comeria pelo resto da vida?", "É comida de dia frio ou ensolarado?", "Qual o acompanhamento perfeito?", "É comida de fim de semana ou de correria?", "Você come triste para dar aquela melhorada no humor?", "Você costuma pedir no delivery ou sair para comer?", "Já passou mal de tanto comer isso?", "É uma comida superestimada ou merece a fama?", "É uma comida que pesa ou dá pra comer um monte?", "Como é o cheiro que deixa na casa?", "Você costuma raspar o prato/panela?"];
        
        let impostorAtual = "";
        let comidaAtual = "";
        let indiceJogadorAtual = 0;
        let indicePerguntaAtual = 0;
        let p_perguntador = [];
        let r_respondedor = [];
        let perguntasSorteadas = [];
        let votosRecebidos = {};

        // --- MENU E JOGADORES ---
        function atualizarInterfaceMenu() {
            // Atualiza Lista de Jogadores
            const divJogadores = document.getElementById('lista-jogadores-ui');
            document.getElementById('contagem-jogadores').innerText = jogadores.length;
            divJogadores.innerHTML = '';
            
            if(jogadores.length === 0) {
                divJogadores.innerHTML = '<p style="color: #888; font-size: 14px; text-align: center;">Nenhum jogador adicionado ainda.</p>';
            } else {
                jogadores.forEach((j, index) => {
                    divJogadores.innerHTML += `
                        <div class="jogador-item">
                            <span>👤 ${j}</span>
                            <button class="btn-pequeno" onclick="removerJogador(${index})">X</button>
                        </div>`;
                });
            }

            // Atualiza Placar (só mostra se o jogo já rodou)
            if (jogoJaIniciou) {
                document.getElementById('box-placar').style.display = 'block';
                const divPlacar = document.getElementById('lista-placar');
                divPlacar.innerHTML = '';
                
                // Cria os jogadores no placar se não existirem
                jogadores.forEach(j => { if (!(j in placar)) placar[j] = 0; });
                
                let placarOrdenado = Object.keys(placar)
                    .filter(j => jogadores.includes(j)) // Mostra apenas quem ainda está no jogo
                    .sort((a, b) => placar[b] - placar[a]);
                
                placarOrdenado.forEach((j, index) => {
                    divPlacar.innerHTML += `<div class="placar-item"><span>${index + 1}º | ${j}</span> <strong>${placar[j]} pts</strong></div>`;
                });
            }
        }

        function adicionarJogador() {
            const input = document.getElementById('novo-jogador');
            const nome = input.value.trim();
            
            if (!nome) {
                alert("Digite um nome primeiro!");
                return;
            }
            if (jogadores.includes(nome)) {
                alert("Este nome já está na lista!");
                return;
            }
            
            jogadores.push(nome);
            input.value = '';
            input.focus(); // Mantém o teclado aberto para o próximo
            atualizarInterfaceMenu();
        }

        function removerJogador(index) {
            jogadores.splice(index, 1);
            atualizarInterfaceMenu();
        }

        function mostrarTela(idTela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');
        }

        function mostrarMenuPosJogo() {
            jogoJaIniciou = true;
            atualizarInterfaceMenu();
            mostrarTela('tela-menu');
        }

        // Permite adicionar jogador apertando "Enter" no teclado
        document.getElementById("novo-jogador").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                adicionarJogador();
            }
        });

        // Auxiliar de embaralhar
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // --- LÓGICA DO JOGO ---
        function iniciarJogo() {
            if (jogadores.length < 3) { alert("Adicione pelo menos 3 jogadores para jogar!"); return; }
            
            // Inicializa placar para novos jogadores antes da rodada
            jogadores.forEach(j => { if (!(j in placar)) placar[j] = 0; });
            
            let comidasDisponiveis = comidas.filter(c => !comidasUsadas.includes(c));
            if (comidasDisponiveis.length === 0) { alert("Acabaram as comidas!"); return; }
            
            comidaAtual = comidasDisponiveis[Math.floor(Math.random() * comidasDisponiveis.length)];
            comidasUsadas.push(comidaAtual);
            
            let candidatos = [...jogadores];
            if (historicoImpostores.length >= 2) {
                let ultimo = historicoImpostores[historicoImpostores.length - 1];
                let penultimo = historicoImpostores[historicoImpostores.length - 2];
                if (ultimo === penultimo && candidatos.includes(ultimo)) {
                    candidatos = candidatos.filter(j => j !== ultimo);
                }
            }
            impostorAtual = candidatos[Math.floor(Math.random() * candidatos.length)];
            historicoImpostores.push(impostorAtual);

            votosRecebidos = {};
            jogadores.forEach(j => votosRecebidos[j] = 0);

            indiceJogadorAtual = 0;
            prepararPassarCelular();
        }

        function prepararPassarCelular() {
            if (indiceJogadorAtual < jogadores.length) {
                document.getElementById('texto-passar').innerText = `Vez de: ${jogadores[indiceJogadorAtual]}\n\n(Esconda o celular dos outros)`;
                mostrarTela('tela-passar');
            } else {
                iniciarPerguntas();
            }
        }

        function revelarPapel() {
            const jogador = jogadores[indiceJogadorAtual];
            document.getElementById('titulo-papel').innerText = `--- SEGREDO DE ${jogador.toUpperCase()} ---`;
            
            if (jogador === impostorAtual) {
                document.getElementById('texto-papel').innerText = "🚨 VOCÊ É O IMPOSTOR! 🚨";
                document.getElementById('texto-papel').style.color = "#ff4757";
            } else {
                document.getElementById('texto-papel').innerText = `✅ VOCÊ É CIDADÃO!\n\nA Comida é: ${comidaAtual}`;
                document.getElementById('texto-papel').style.color = "#2ed573";
            }
            mostrarTela('tela-revelacao');
        }

        function proximoJogadorFaseRevelacao() {
            indiceJogadorAtual++;
            prepararPassarCelular();
        }

        function iniciarPerguntas() {
            p_perguntador = shuffle([...jogadores]);
            r_respondedor = p_perguntador.slice(1).concat(p_perguntador[0]);
            perguntasSorteadas = shuffle([...perguntas]).slice(0, jogadores.length);
            
            indicePerguntaAtual = 0;
            mostrarProximaPergunta();
        }

        function mostrarProximaPergunta() {
            if (indicePerguntaAtual < jogadores.length) {
                let quemPergunta = p_perguntador[indicePerguntaAtual];
                let quemResponde = r_respondedor[indicePerguntaAtual];
                let qualPergunta = perguntasSorteadas[indicePerguntaAtual];
                
                document.getElementById('texto-pergunta').innerHTML = `<b>${quemPergunta}</b> pergunta para <b>${quemResponde}</b>:<br><br>💬 <i>"${qualPergunta}"</i>`;
                mostrarTela('tela-perguntas');
            } else {
                iniciarVotacao();
            }
        }

        function proximaPergunta() {
            indicePerguntaAtual++;
            mostrarProximaPergunta();
        }

        function iniciarVotacao() {
            indiceJogadorAtual = 0;
            prepararVoto();
        }

        function prepararVoto() {
            if (indiceJogadorAtual < jogadores.length) {
                let jogadorVotando = jogadores[indiceJogadorAtual];
                document.getElementById('texto-vez-votar').innerText = `Vez de ${jogadorVotando} votar:`;
                
                let divBotoes = document.getElementById('botoes-votos');
                divBotoes.innerHTML = '';
                
                jogadores.forEach(alvo => {
                    if (alvo !== jogadorVotando) {
                        let btn = document.createElement('button');
                        btn.innerText = alvo;
                        btn.onclick = () => registrarVoto(jogadorVotando, alvo);
                        divBotoes.appendChild(btn);
                    }
                });
                mostrarTela('tela-votacao');
            } else {
                calcularResultado();
            }
        }

        function registrarVoto(quemVotou, alvo) {
            votosRecebidos[alvo]++;
            if (alvo === impostorAtual && quemVotou !== impostorAtual) {
                placar[quemVotou] += 1;
            }
            indiceJogadorAtual++;
            prepararVoto();
        }

        function calcularResultado() {
            let maxVotos = Math.max(...Object.values(votosRecebidos));
            let maisVotados = Object.keys(votosRecebidos).filter(j => votosRecebidos[j] === maxVotos);
            
            let texto = document.getElementById('texto-resultado');
            texto.innerHTML = `O impostor era: <b>${impostorAtual}</b>!<br><br>`;
            
            if (!maisVotados.includes(impostorAtual)) {
                texto.innerHTML += `🎉 O Impostor enganou a todos e ganhou +2 pontos!`;
                placar[impostorAtual] += 2;
                mostrarTela('tela-resultado');
            } 
            else if (maisVotados.length > 1 && maisVotados.includes(impostorAtual)) {
                texto.innerHTML += `⚖️ Deu Empate! Mas o Impostor sobreviveu e ganhou +2 pontos!`;
                placar[impostorAtual] += 2;
                mostrarTela('tela-resultado');
            } 
            else {
                prepararPalpiteComida();
            }
        }

        function prepararPalpiteComida() {
            document.getElementById('nome-impostor-descoberto').innerText = impostorAtual;
            
            let outrasComidas = comidas.filter(c => c !== comidaAtual);
            let opcoes = shuffle(outrasComidas).slice(0, 4);
            opcoes.push(comidaAtual);
            opcoes = shuffle(opcoes);

            let divBotoes = document.getElementById('botoes-palpite');
            divBotoes.innerHTML = '';
            
            opcoes.forEach(opcao => {
                let btn = document.createElement('button');
                btn.innerText = opcao;
                btn.onclick = () => verificarPalpite(opcao);
                divBotoes.appendChild(btn);
            });
            
            mostrarTela('tela-palpite');
        }

        function verificarPalpite(palpite) {
            let texto = document.getElementById('texto-resultado');
            if (palpite === comidaAtual) {
                placar[impostorAtual] += 1;
                texto.innerHTML = `🚨 A casa caiu! O Impostor <b>${impostorAtual}</b> foi descoberto pela maioria...<br><br>🎯 MAS ACERTOU O PALPITE! Era ${comidaAtual}. (Ganhou +1 ponto)`;
            } else {
                texto.innerHTML = `🚨 A casa caiu! O Impostor <b>${impostorAtual}</b> foi descoberto.<br><br>❌ E errou o palpite! A comida era ${comidaAtual}.`;
            }
            mostrarTela('tela-resultado');
        }

        // Inicialização da Tela Vazia
        atualizarInterfaceMenu();
    </script>
</body>
</html>
