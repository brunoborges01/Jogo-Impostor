<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Impostor - Arraiá</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2b1b11; 
            background-image: repeating-linear-gradient(45deg, rgba(255, 153, 0, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 153, 0, 0.03) 75%, rgba(255, 153, 0, 0.03)), 
                              repeating-linear-gradient(-45deg, rgba(255, 153, 0, 0.03) 25%, transparent 25%, transparent 75%, rgba(255, 153, 0, 0.03) 75%, rgba(255, 153, 0, 0.03));
            background-size: 40px 40px;
            color: #fff3e0; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        h1, h2, h3 { 
            color: #ffb300; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6); 
        }
        .tela { display: none; width: 100%; max-width: 400px; }
        .tela.ativa { display: block; }
        
        button {
            background-color: #d84315; 
            color: #fff;
            border: 2px dashed #ffb300; 
            padding: 15px 20px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 18px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 3px 3px 0px #870000;
            transition: all 0.1s;
        }
        button:active { 
            background-color: #bf360c; 
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #870000;
        }
        .btn-verde { 
            background-color: #2e7d32; 
            border-color: #aeea00; 
            box-shadow: 3px 3px 0px #1b5e20;
            margin-top: 20px;
        }
        .btn-verde:active { 
            background-color: #1b5e20; 
            box-shadow: 1px 1px 0px #1b5e20;
        }
        .btn-pequeno { 
            padding: 5px 10px; 
            width: auto; 
            margin: 0; 
            background-color: transparent; 
            border: 1px dashed #ffb300; 
            color: #ffb300;
            box-shadow: none;
        }
        .btn-pequeno:active { transform: scale(0.95); box-shadow: none;}
        
        input {
            padding: 15px;
            font-size: 16px;
            width: calc(100% - 34px);
            border-radius: 8px;
            border: 2px dashed #ffb300;
            margin-bottom: 10px;
            background-color: #4e342e;
            color: #fff3e0;
        }
        input::placeholder { color: #bcaaa4; }
        
        .sessao-box { 
            background: rgba(62, 39, 35, 0.95); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            text-align: left;
            border: 2px solid #8d6e63;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .placar-item, .jogador-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px dashed #8d6e63; 
            padding: 10px 0;
        }
        .jogador-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div id="tela-menu" class="tela ativa">
        <h1>Arraiá do Impostor 🌽🕵️‍♂️</h1>
        
        <div class="sessao-box" id="box-novo-jogador">
            <h3 style="margin-top: 0;">Novo Caipira</h3>
            <input type="text" id="novo-jogador" placeholder="Digite o nome do compadre...">
            <button onclick="adicionarJogador()">Confirmar</button>
        </div>

        <div class="sessao-box" id="box-jogadores">
            <h3 style="margin-top: 0;">Gente na Roda (<span id="contagem-jogadores">0</span>)</h3>
            <div id="lista-jogadores-ui"></div>
        </div>

        <div class="sessao-box" id="box-placar" style="display: none;">
            <h3 style="margin-top: 0;">Placar do Arraiá:</h3>
            <div id="lista-placar"></div>
        </div>

        <button onclick="mostrarTelaCategoria()" class="btn-verde">Puxar a Quadrilha (Iniciar)</button>
    </div>

    <div id="tela-categoria" class="tela">
        <h2>Escolha o Tema da Rodada 🎲</h2>
        <button onclick="prepararRodada('comida')" class="btn-verde">🍔 Comida</button>
        <button onclick="prepararRodada('objeto')" class="btn-verde">🪑 Objeto</button>
        <button onclick="prepararRodada('animal')" class="btn-verde">🐶 Animal</button>
    </div>

    <div id="tela-passar" class="tela">
        <h2 id="texto-passar">Passe o celular para...</h2>
        <button onclick="revelarPapel()">Espiar meu segredo 👀</button>
    </div>

    <div id="tela-revelacao" class="tela">
        <h2 id="titulo-papel">--- SEGREDO ---</h2>
        <p id="texto-papel" style="font-size: 24px; font-weight: bold;"></p>
        <button onclick="proximoJogadorFaseRevelacao()">Entendi, esconder! 🤫</button>
    </div>

    <div id="tela-perguntas" class="tela">
        <h2>🎙️ Hora da Prosa</h2>
        <p id="texto-pergunta" style="font-size: 20px; background: rgba(62, 39, 35, 0.9); padding: 15px; border-radius: 8px; border: 1px dashed #ffb300;"></p>
        <button onclick="proximaPergunta()" class="btn-verde">Próxima Pergunta</button>
    </div>

    <div id="tela-votacao" class="tela">
        <h2>⚖️ Correio Elegante (Votação)</h2>
        <h3 id="texto-vez-votar"></h3>
        <p>Quem é o Falso Caipira (Impostor)?</p>
        <div id="botoes-votos"></div>
    </div>

    <div id="tela-resultado" class="tela">
        <h2 id="titulo-resultado">Fim da Rodada 🔥</h2>
        <p id="texto-resultado" style="font-size: 20px;"></p>
        <button onclick="mostrarMenuPosJogo()" class="btn-verde">Jogar Mais Uma 🪗</button>
    </div>

    <div id="tela-palpite" class="tela">
        <h2>🤐 O Falso Caipira era: <span id="nome-impostor-descoberto"></span></h2>
        <p id="texto-instrucao-palpite"></p>
        <div id="botoes-palpite"></div>
    </div>

    <script>
        // --- VARIÁVEIS GLOBAIS ---
        let jogadores = [];
        let placar = {};
        let historicoImpostores = [];
        let jogoJaIniciou = false;
        let impostorFoiDescoberto = false; 
        let jogadoresMaisVotados = []; 
        let limitePartidas = 0; 
        let partidasJogadas = 0;
        
        let itensUsados = { comida: [], objeto: [], animal: [] };
        
        const comidas = ["Açaí", "Alfajor", "Arroz Doce", "Bacon", "Batata Frita", "Beijinho", "Bife à Parmegiana", "Bolo de Cenoura", "Brigadeiro", "Cachorro Quente", "Churros", "Coxinha", "Croissant", "Feijoada", "Hambúrguer", "Lasanha", "Macarrão", "Misto Quente", "Omelete", "Panqueca", "Pastel", "Pão de Queijo", "Pipoca", "Pizza", "Pudim", "Salada", "Sorvete", "Strogonoff", "Sushi", "Yakisoba"];
        const perguntas_comidas = ["Você prefere comer isso no café da manhã, almoço, janta ou na madrugada?", "É o tipo de comida que você divide ou come escondido?", "Combina mais com refri, suco natural ou cerveja?", "Qual o molho não pode faltar?", "Fica melhor no dia seguinte requentado?", "Faz muita sujeira para comer no sofá?", "Dá para comer todo dia ou enjoa?", "Você prefere a versão caseira ou comprada?", "Comeria pelo resto da vida?", "É comida de dia frio ou ensolarado?", "Qual o acompanhamento perfeito?", "É comida de fim de semana ou de correria?", "Você come triste para dar aquela melhorada no humor?", "Você costuma pedir no delivery ou sair para comer?", "Já passou mal de tanto comer isso?", "É uma comida superestimada ou merece a fama?", "É uma comida que pesa ou dá pra comer um monte?", "Como é o cheiro que deixa na casa?", "Você costuma raspar o prato/panela?"];
        
        const objetos = ["Liquidificador", "Frigideira", "Abridor de Vinho", "Varal", "Vassoura", "Travesseiro", "Chuveiro", "Faca de Chef", "Cesto de Roupa", "Espelho", "Cafeteira", "Torradeira", "Micro-ondas", "Tapete", "Luminária", "Smartphone", "Notebook", "Relógio", "Livro", "Cadeira Gamer", "Tênis", "Fone de Ouvido", "Mochila", "Chave", "Carteira", "Óculos", "Teclado", "Mouse", "Garrafa de água", "Guarda-chuva", "Câmera", "Violão", "Carregador", "Monitor", "Cinto", "Caneta", "Agenda", "Toalha", "Abajur", "Ventilador", "Copo", "Prato", "Escova de dente", "Tesoura", "Martelo", "Furadeira", "Cobertor", "Sofá", "Mesa", "Alicate", "Chave de Fenda", "Nível", "Trena", "Parafusadeira", "Fita Adesiva", "Grampeador", "Pasta de Documentos", "Calculadora", "Calendário", "Pincel", "Paleta de cores", "Tripé", "Controle Remoto", "Roteador", "Teclado numérico", "Webcam", "Base de notebook", "Mousepad", "Cabo HDMI", "Adaptador de tomada", "Extensão elétrica", "Lanterna", "Pilhas", "Lâmpada", "Cabide", "Sapateira", "Caixa organizadora", "Etiquetadora", "Pasta suspensa", "Saca-rolhas", "Ralador", "Peneira", "Escorredor de pratos", "Tábua de corte", "Potes de vidro", "Tupperware", "Bule", "Xícara", "Coador de café", "Guardanapo", "Toalha de mesa", "Cortina", "Tapete de entrada", "Almofada", "Vaso de planta", "Regador", "Ferro de passar", "Tábua de passar", "Cabideiro"];
        const perguntas_objeto = ["Em que cômodo da casa esse objeto normalmente fica?", "Você precisa de energia elétrica para fazê-lo funcionar?", "Qual é o principal material de que ele é feito?", "Esse objeto é mais pesado ou mais leve que uma cadeira?", "Ele é considerado uma ferramenta ou um item de conforto?", "Você consegue carregá-lo apenas com uma mão?", "A função dele é facilitar uma tarefa ou apenas decorar?", "Você usa esse objeto várias vezes ao dia ou esporadicamente?", "É um objeto que costuma ser compartilhado ou é de uso individual?", "Ele é algo que você guarda dentro de uma gaveta ou deixa exposto?", "Se esse objeto parasse de existir hoje, sua rotina seria muito prejudicada?", "Você costuma lavar esse objeto frequentemente?", "É um item que você sempre leva em viagens ou deixa fixo?", "Você sente algum tipo de prazer ou satisfação ao usá-lo?", "Ele é feito para durar anos ou é descartável com o tempo?", "Você compraria uma versão muito mais cara só pela marca?", "Qual é a cor mais comum que encontramos esse objeto no mercado?", "Ele emite algum som característico durante o uso?", "É um objeto que precisa de manutenção ou revisão técnica?", "Se ele fosse um animal, ele seria rápido ou lento?", "Você consegue descrever o formato dele sem usar as mãos?", "Ele pode ser perigoso se usado da maneira errada?", "Existe algum acessório que é indispensável para esse objeto?", "Você prefere ter um modelo simples ou um cheio de funções?", "Qual seria a primeira coisa que você faria se encontrasse esse objeto no meio da rua?", "Você acha que ele vai se tornar obsoleto nos próximos 10 anos?", "Qual é a maior frustração que alguém pode ter ao usar esse objeto?", "Ele combina mais com um ambiente de trabalho ou de descanso?", "Se você pudesse redesenhá-lo, o que mudaria primeiro?"];
        
        const animais = ["Cachorro", "Gato", "Leão", "Elefante", "Golfinho", "Coruja", "Águia", "Urso", "Cavalo", "Tigre", "Pinguim", "Lobo", "Macaco", "Tartaruga", "Coelho", "Raposa", "Borboleta", "Tubarão", "Cobra", "Hamster", "Baleia", "Girafa", "Zebra", "Arara", "Polvo", "Formiga", "Abelha", "Camelo", "Rinoceronte", "Jacaré", "Flamingo", "Sapo", "Escorpião", "Preguiça", "Canguru", "Papagaio", "Hiena", "Vaca", "Pato", "Corvo", "Galinha", "Serpente", "Foca", "Morcego", "Castor"];
        const perguntasAnimais = ["Você teria coragem de adotar um desses como bicho de estimação?", "É um animal que você prefere observar de longe?", "Qual característica física você acha mais impressionante?", "Você acha que ele se pareceria com você em algum aspecto?", "Daria para conviver pacificamente na mesma casa?", "Você teria medo de encontrar um desses na natureza?", "Você acha esse animal elegante ou desengonçado?", "Se fosse um animal, você escolheria ser esse?", "Você acha que esse bicho é inteligente?", "Você prefere ver no zoológico ou em documentários?", "Você acha que ele é agressivo ou dócil?", "É um animal que você considera exótico?", "Você acha que ele traz sorte?", "Você já teve uma experiência real com um desses?", "Você acha que ele precisa de muito espaço para viver?", "Você considera esse animal bonito ou assustador?", "Você acha que ele seria um bom companheiro?", "O som que ele faz te agrada ou irrita?", "Você acha que ele deveria ser protegido com prioridade?", "Você acha que esse animal tem uma vida fácil?", "Você acha que ele é um sobrevivente nato?", "Você acha que ele sente empatia?", "Você já viu um desses de perto fora de telas?", "Para você, esse animal simboliza algo específico?", "Você acha que ele dorme muito ou pouco?", "Você acha que ele é sociável ou solitário?"];
        
        let impostorAtual = "";
        let itemSecretoAtual = "";
        let categoriaAtualNome = "";
        let listaItensAtual = [];
        let listaPerguntasAtual = [];

        let indiceJogadorAtual = 0;
        let indicePerguntaAtual = 0;
        let p_perguntador = [];
        let r_respondedor = [];
        let perguntasSorteadas = [];
        let votosRecebidos = {};

        // --- MENU E JOGADORES ---
        function atualizarInterfaceMenu() {
			const divJogadores = document.getElementById('lista-jogadores-ui');
			const boxNovoJogador = document.getElementById('box-novo-jogador');
			const boxJogadores = document.getElementById('box-jogadores'); // Nova linha capturando a caixa inteira
			
			document.getElementById('contagem-jogadores').innerText = jogadores.length;
			divJogadores.innerHTML = '';
			
			// Controle de visibilidade após a primeira rodada
			if (jogoJaIniciou) {
				boxNovoJogador.style.display = 'none';
				boxJogadores.style.display = 'none'; // Esconde o "Gente na Roda"
			} else {
				boxNovoJogador.style.display = 'block';
				boxJogadores.style.display = 'block'; // Mostra apenas antes do jogo iniciar
			}
            
            if(jogadores.length === 0) {
                divJogadores.innerHTML = '<p style="color: #bcaaa4; font-size: 14px; text-align: center;">Nenhum compadre na roda ainda.</p>';
            } else {
                jogadores.forEach((j, index) => {
                    let botaoRemover = jogoJaIniciou ? '' : `<button class="btn-pequeno" onclick="removerJogador(${index})">X</button>`;
                    divJogadores.innerHTML += `
                        <div class="jogador-item">
                            <span>👒 ${j}</span>
                            ${botaoRemover}
                        </div>`;
                });
            }

            if (jogoJaIniciou) {
                document.getElementById('box-placar').style.display = 'block';
                const divPlacar = document.getElementById('lista-placar');
                divPlacar.innerHTML = '';
                
                jogadores.forEach(j => { if (!(j in placar)) placar[j] = 0; });
                let placarOrdenado = Object.keys(placar)
                    .filter(j => jogadores.includes(j))
                    .sort((a, b) => placar[b] - placar[a]);
                
                placarOrdenado.forEach((j, index) => {
                    divPlacar.innerHTML += `<div class="placar-item"><span>${index + 1}º | ${j}</span> <strong>${placar[j]} pts</strong></div>`;
                });

                const btnIniciar = document.querySelector('.btn-verde');
                if (partidasJogadas >= limitePartidas && limitePartidas > 0) {
                    btnIniciar.innerText = "Arraiá Encerrado! 🔥";
                    btnIniciar.style.backgroundColor = "#5d4037";
                    btnIniciar.disabled = true;
                } else {
                    btnIniciar.innerText = "Puxar a Quadrilha (Iniciar)";
                    btnIniciar.style.backgroundColor = "#2e7d32";
                    btnIniciar.disabled = false;
                }
            }
        }

        function adicionarJogador() {
            const input = document.getElementById('novo-jogador');
            const nome = input.value.trim();
            
            if (!nome) {
                alert("Oxe! Digite um nome primeiro sô!");
                return;
            }
            if (jogadores.includes(nome)) {
                alert("Esse compadre já tá na lista!");
                return;
            }
            
            jogadores.push(nome);
            input.value = '';
            input.focus();
            atualizarInterfaceMenu();
        }

        function removerJogador(index) {
            jogadores.splice(index, 1);
            atualizarInterfaceMenu();
        }

        function mostrarTela(idTela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');
        }

        function mostrarMenuPosJogo() {
            jogoJaIniciou = true;
            atualizarInterfaceMenu();
            mostrarTela('tela-menu');
        }

        document.getElementById("novo-jogador").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                adicionarJogador();
            }
        });

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // --- LÓGICA DO JOGO ---
        function mostrarTelaCategoria() {
            if (jogadores.length < 3) { 
                alert("Chama pelo menos 3 compadres pra jogar!"); 
                return; 
            }
            if (partidasJogadas === 0) {
                limitePartidas = jogadores.length;
            }
            if (partidasJogadas >= limitePartidas) {
                return; 
            }
            mostrarTela('tela-categoria');
        }

        function prepararRodada(categoria) {
            jogadores.forEach(j => { if (!(j in placar)) placar[j] = 0; });

            let itensDisponiveis = [];

            if (categoria === 'comida') {
                listaItensAtual = comidas;
                listaPerguntasAtual = perguntas_comidas;
                categoriaAtualNome = "A Comida";
            } else if (categoria === 'objeto') {
                listaItensAtual = objetos;
                listaPerguntasAtual = perguntas_objeto;
                categoriaAtualNome = "O Objeto";
            } else if (categoria === 'animal') {
                listaItensAtual = animais;
                listaPerguntasAtual = perguntasAnimais;
                categoriaAtualNome = "O Animal";
            }

            itensDisponiveis = listaItensAtual.filter(i => !itensUsados[categoria].includes(i));
            
            if (itensDisponiveis.length === 0) { 
                alert(`Vixe, a barraquinha zerou a lista de ${categoria}! Escolha outra categoria.`); 
                return; 
            }
            
            itemSecretoAtual = itensDisponiveis[Math.floor(Math.random() * itensDisponiveis.length)];
            itensUsados[categoria].push(itemSecretoAtual);
            
            let candidatos = [...jogadores];
            if (historicoImpostores.length >= 2) {
                let ultimo = historicoImpostores[historicoImpostores.length - 1];
                let penultimo = historicoImpostores[historicoImpostores.length - 2];
                if (ultimo === penultimo && candidatos.includes(ultimo)) {
                    candidatos = candidatos.filter(j => j !== ultimo);
                }
            }
            impostorAtual = candidatos[Math.floor(Math.random() * candidatos.length)];
            historicoImpostores.push(impostorAtual);

            votosRecebidos = {};
            jogadores.forEach(j => votosRecebidos[j] = 0);

            indiceJogadorAtual = 0;
            prepararPassarCelular();
        }

        function prepararPassarCelular() {
            if (indiceJogadorAtual < jogadores.length) {
                document.getElementById('texto-passar').innerText = `Vez de: ${jogadores[indiceJogadorAtual]}\n\n(Esconda o celular da vizinhança)`;
                mostrarTela('tela-passar');
            } else {
                iniciarPerguntas();
            }
        }

        function revelarPapel() {
            const jogador = jogadores[indiceJogadorAtual];
            document.getElementById('titulo-papel').innerText = `--- SEGREDO DE ${jogador.toUpperCase()} ---`;
            
            if (jogador === impostorAtual) {
                document.getElementById('texto-papel').innerText = "🚨 VOCÊ É O FALSO CAIPIRA (IMPOSTOR)! 🚨";
                document.getElementById('texto-papel').style.color = "#ff5252";
            } else {
                let mensagem = `✅ VOCÊ É DA ROÇA!\n\n${categoriaAtualNome} é:\n${itemSecretoAtual}`;
                
                if (partidasJogadas === 0) {
                    mensagem += "\n\nObservação: Estamos do mesmo lado Rapha!";
                }
                
                document.getElementById('texto-papel').innerText = mensagem;
                document.getElementById('texto-papel').style.color = "#69f0ae";
            }
            mostrarTela('tela-revelacao');
        }

        function proximoJogadorFaseRevelacao() {
            indiceJogadorAtual++;
            prepararPassarCelular();
        }

        function iniciarPerguntas() {
            p_perguntador = shuffle([...jogadores]);
            r_respondedor = p_perguntador.slice(1).concat(p_perguntador[0]);
            perguntasSorteadas = shuffle([...listaPerguntasAtual]).slice(0, jogadores.length);
            
            indicePerguntaAtual = 0;
            mostrarProximaPergunta();
        }

        function mostrarProximaPergunta() {
            if (indicePerguntaAtual < jogadores.length) {
                let quemPergunta = p_perguntador[indicePerguntaAtual];
                let quemResponde = r_respondedor[indicePerguntaAtual];
                let qualPergunta = perguntasSorteadas[indicePerguntaAtual];
                
                document.getElementById('texto-pergunta').innerHTML = `<b>${quemPergunta}</b> pergunta para <b>${quemResponde}</b>:<br><br>💬 <i>"${qualPergunta}"</i>`;
                mostrarTela('tela-perguntas');
            } else {
                iniciarVotacao();
            }
        }

        function proximaPergunta() {
            indicePerguntaAtual++;
            mostrarProximaPergunta();
        }

        function iniciarVotacao() {
            indiceJogadorAtual = 0;
            prepararVoto();
        }

        function prepararVoto() {
            if (indiceJogadorAtual < jogadores.length) {
                let jogadorVotando = jogadores[indiceJogadorAtual];
                document.getElementById('texto-vez-votar').innerText = `Vez de ${jogadorVotando} votar:`;
                
                let divBotoes = document.getElementById('botoes-votos');
                divBotoes.innerHTML = '';
                
                jogadores.forEach(alvo => {
                    if (alvo !== jogadorVotando) {
                        let btn = document.createElement('button');
                        btn.innerText = alvo;
                        btn.onclick = () => registrarVoto(jogadorVotando, alvo);
                        divBotoes.appendChild(btn);
                    }
                });
                mostrarTela('tela-votacao');
            } else {
                calcularResultado();
            }
        }

        function registrarVoto(quemVotou, alvo) {
            votosRecebidos[alvo]++;
            if (alvo === impostorAtual && quemVotou !== impostorAtual) {
                placar[quemVotou] += 1;
            }
            indiceJogadorAtual++;
            prepararVoto();
        }

        function calcularResultado() {
            let maxVotos = Math.max(...Object.values(votosRecebidos));
            jogadoresMaisVotados = Object.keys(votosRecebidos).filter(j => votosRecebidos[j] === maxVotos); 
            
            if (!jogadoresMaisVotados.includes(impostorAtual) || (jogadoresMaisVotados.length > 1 && jogadoresMaisVotados.includes(impostorAtual))) {
                impostorFoiDescoberto = false;
                placar[impostorAtual] += 2; 
            } else {
                impostorFoiDescoberto = true;
            }

            prepararPalpite();
        }

        function prepararPalpite() {
            document.getElementById('nome-impostor-descoberto').innerText = impostorAtual;
            
            let textoInstrucao = document.getElementById('texto-instrucao-palpite');
            let nomeDaCategoria = categoriaAtualNome.toLowerCase();

            if (impostorFoiDescoberto) {
                textoInstrucao.innerText = `🚨 Te pegaram na mentira! Mas cê ainda pode tentar adivinhar ${nomeDaCategoria} para ganhar 2 pontos de consolação!`;
            } else {
                textoInstrucao.innerText = `🎉 Cê enganou a quadrilha toda! Agora tente adivinhar ${nomeDaCategoria} pra ganhar MAIS 2 pontos extras!`;
            }

            let outrosItens = listaItensAtual.filter(c => c !== itemSecretoAtual);
            let opcoes = shuffle(outrosItens).slice(0, 4);
            opcoes.push(itemSecretoAtual);
            opcoes = shuffle(opcoes);

            let divBotoes = document.getElementById('botoes-palpite');
            divBotoes.innerHTML = '';
            
            opcoes.forEach(opcao => {
                let btn = document.createElement('button');
                btn.innerText = opcao;
                btn.onclick = () => verificarPalpite(opcao);
                divBotoes.appendChild(btn);
            });
            
            mostrarTela('tela-palpite');
        }

        function verificarPalpite(palpite) {
            let texto = document.getElementById('texto-resultado');
            let acertouPalpite = (palpite === itemSecretoAtual);

            if (acertouPalpite) {
                placar[impostorAtual] += 2;
            }

            partidasJogadas++;

            let resumo = `O Falso Caipira era: <b>${impostorAtual}</b>!<br><br>`;

            if (impostorFoiDescoberto) {
                resumo += `🚨 <b>A casa caiu sô!</b> A maioria votou certo e o Impostor foi pego no flagra.<br><br>`;
            } else {
                if (jogadoresMaisVotados.length > 1) {
                    let nomesEmpatados = jogadoresMaisVotados.join(', ');
                    resumo += `⚖️ <b>Deu empate na roça!</b><br>Os mais votados foram: <b>${nomesEmpatados}</b>.<br><br>`;
                } else {
                    resumo += `🎉 <b>Enganou geral!</b><br>O mais votado foi <b>${jogadoresMaisVotados[0]}</b>.<br><br>`;
                }
            }

            resumo += acertouPalpite ? `🎯 <b>Acertou o palpite!</b>` : `❌ <b>Errou o palpite! A resposta certa era ${itemSecretoAtual}.</b>`;
            resumo += `<br><br><b>Rodada ${partidasJogadas} de ${limitePartidas}</b>`;

            texto.innerHTML = resumo;
            mostrarTela('tela-resultado');
        }

        // Inicialização
        atualizarInterfaceMenu();
    </script>
</body>
</html>
